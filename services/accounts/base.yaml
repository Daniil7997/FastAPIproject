services:
  accounts_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME} 
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    container_name: accounts_db
    volumes:
      - accounts_db_data:/var/lib/postgresql/data
    networks:
      - app_network

  accounts_service:
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      IS_TEST_DB: ${IS_TEST_DB:-False}
      PRIVATE_KEY_HEX: ${PRIVATE_KEY_HEX}
    build:
      context: .
      target: ${BUILD_TARGET}
    container_name: accounts_service
    depends_on:
      accounts_db:
        condition: service_healthy
    # command будет переопределён.
    command: sh -c "alembic upgrade head && fastapi dev app/main.py --host 0.0.0.0 --port 8081"
    volumes:
      - .:/project
    # ports:
    #   - "8081:8081"
    networks:
      - app_network

volumes:
  accounts_db_data:

networks:
  app_network:
    driver: bridge


